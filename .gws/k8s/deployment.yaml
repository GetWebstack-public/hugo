apiVersion: apps/v1
kind: Deployment
metadata:
  name: hugo
  namespace: hugo
  labels:
    app: hugo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hugo
  template:
    metadata:
      labels:
        app: hugo
    spec:
      containers:
      - name: hugo
        image: hugo
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 1313
          name: http
          protocol: TCP
      restartPolicy: Always
